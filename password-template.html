<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>/*[|template_title|]*/0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="cache-control" content="max-age=0">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta http-equiv="pragma" content="no-cache">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: "Geist", sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.5;
            color: #000;
            background: #fff;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        a:hover {
            opacity: 0.5;
        }

        header {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: "Geist Mono", monospace;
            text-transform: uppercase;
        }

        .logo {
            font-size: 14px;
            font-weight: 500;
            color: rgb(50, 64, 79);
            display: flex;
            flex-wrap: wrap;
            gap: 0 8px;
        }

        .logo-title {
            opacity: 0.5;
        }

        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            color: rgb(50, 64, 79);
            opacity: 0.5;
        }

        nav a:hover {
            opacity: 1;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 48px 24px;
            margin-top: -48px;
        }

        .password-container {
            max-width: 440px;
            width: 100%;
        }

        h1 {
            font-family: "IBM Plex Serif", serif;
            font-size: 32px;
            font-weight: 400;
            color: #000;
            margin-bottom: 16px;
        }

        .instructions {
            color: #888;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .instructions a {
            color: #000;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .instructions a:hover {
            opacity: 0.5;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .password-input {
            flex: 1;
            font-family: inherit;
            font-size: 16px;
            padding: 12px 16px;
            background: #f5f5f5;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            border-radius: 4px 4px 0 0;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .password-input::placeholder {
            color: #aaa;
        }

        .password-input:focus {
            background: #f0f0f0;
            border-bottom-color: #000;
        }

        .submit-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.2;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }

        .submit-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .submit-btn.active:hover {
            transform: translateX(4px);
        }

        .submit-btn svg {
            width: 24px;
            height: 24px;
        }

        .error-message {
            color: #e53935;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        .hidden {
            display: none !important;
        }

        .staticrypt-spinner-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .staticrypt-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #e0e0e0;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo"><span>Max—R</span><span class="logo-title">Product Designer</span></a>
        <nav>
            <a href="index.html#work">Work</a>
            <a href="index.html#about">About</a>
        </nav>
    </header>

    <div id="staticrypt_loading" class="staticrypt-spinner-container">
        <div class="staticrypt-spinner"></div>
    </div>

    <main id="staticrypt_content" class="hidden">
        <div class="password-container">
            <h1>Password protected</h1>
            <p class="instructions">Please <a href="mailto:max.romanoff@hotmail.com">reach out</a> for access</p>

            <form id="staticrypt-form" action="#" method="post">
                <div class="input-group">
                    <input
                        type="password"
                        id="staticrypt-password"
                        name="password"
                        class="password-input"
                        placeholder="/*[|template_placeholder|]*/0"
                        autocomplete="current-password"
                    >
                    <button type="submit" id="submit-btn" class="submit-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
                <p id="staticrypt-error" class="error-message"></p>
                <input type="checkbox" id="staticrypt-remember" name="remember" class="hidden">
            </form>
        </div>
    </main>

    <script>
        // StatiCrypt variables
        const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
        const templateError = "/*[|template_error|]*/0",
            isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
            staticryptConfig = /*[|staticrypt_config|]*/ 0;

        const templateConfig = {
            rememberExpirationKey: "staticrypt_expiration",
            rememberPassphraseKey: "staticrypt_passphrase",
            replaceHtmlCallback: null,
            clearLocalStorageCallback: null,
        };

        const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

        // Enable/disable arrow button based on input
        const passwordInput = document.getElementById('staticrypt-password');
        const submitBtn = document.getElementById('submit-btn');
        const errorEl = document.getElementById('staticrypt-error');

        passwordInput.addEventListener('input', function() {
            if (this.value.length >= 2) {
                submitBtn.classList.add('active');
            } else {
                submitBtn.classList.remove('active');
            }
            // Clear error when typing
            errorEl.textContent = '';
        });

        // Handle decryption on load (for remembered passwords)
        window.onload = async function () {
            const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

            if (!isSuccessful) {
                document.getElementById("staticrypt_loading").classList.add("hidden");
                document.getElementById("staticrypt_content").classList.remove("hidden");
                document.getElementById("staticrypt-password").focus();
            }
        };

        // Handle form submission
        document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
            e.preventDefault();

            const password = document.getElementById("staticrypt-password").value,
                isRememberChecked = document.getElementById("staticrypt-remember").checked;

            const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

            if (!isSuccessful) {
                errorEl.textContent = templateError;
            }
        });
    </script>
</body>
</html>
